<!-- Community/Tournaments (1/3 width) -->
<div class="lg:col-span-1 bg-white/5 border border-white/10 rounded-xl p-6">
  <div class="flex items-center gap-3 mb-6">
    <mat-icon svgIcon="event_available" class="text-primary"></mat-icon>
    <h2 class="text-xl font-black uppercase tracking-tight">Eventos</h2>
  </div>
  <div class="space-y-4">
    <!-- Event 1 -->
    <div
      class="p-3 bg-white/5 rounded-lg border-l-4 border-primary hover:bg-white/10 transition-all group cursor-pointer"
    >
      <div class="flex justify-between items-start mb-2">
        <span
          class="text-[10px] font-black bg-primary/20 text-primary px-2 py-0.5 rounded uppercase"
          >Standard</span
        >
        <span class="text-[10px] text-slate-400 font-bold uppercase"
          >21 Febrero, 5PM</span
        >
      </div>
      <h4 class="font-bold text-sm mb-1 group-hover:text-primary transition-colors">
        Liga Semanal de Pokémon TCG
      </h4>
      <div class="flex items-center justify-between">
        <p class="text-xs text-slate-400 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">Grupo</span> 12/24 Lugares
        </p>
        <span class="text-xs font-bold text-primary">Ver Evento</span>
      </div>
    </div>
    <!-- Event 2 -->
    <div
      class="p-3 bg-white/5 rounded-lg border-l-4 border-emerald-500 hover:bg-white/10 transition-all group cursor-pointer"
    >
      <div class="flex justify-between items-start mb-2">
        <span
          class="text-[10px] font-black bg-emerald-500/20 text-emerald-500 px-2 py-0.5 rounded uppercase"
          >Commander</span
        >
        <span class="text-[10px] text-slate-400 font-bold uppercase"
          >26 Octubre, 2PM</span
        >
      </div>
      <h4 class="font-bold text-sm mb-1 group-hover:text-emerald-500 transition-colors">
        EDH Sunday Social
      </h4>
      <div class="flex items-center justify-between">
        <p class="text-xs text-slate-400 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">Grupo</span> 8/32 Lugares
        </p>
        <span class="text-xs font-bold text-primary">Ver Evento</span>
      </div>
    </div>
    <!-- Event 3 -->
    <div
      class="p-3 bg-white/5 rounded-lg border-l-4 border-amber-500 hover:bg-white/10 transition-all group cursor-pointer"
    >
      <div class="flex justify-between items-start mb-2">
        <span
          class="text-[10px] font-black bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded uppercase"
          >Modern</span
        >
        <span class="text-[10px] text-slate-400 font-bold uppercase"
          >29 Octubre, 7PM</span
        >
      </div>
      <h4 class="font-bold text-sm mb-1 group-hover:text-amber-500 transition-colors">
        Modern Horizons 3 Draft
      </h4>
      <div class="flex items-center justify-between">
        <p class="text-xs text-slate-400 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">Grupo</span> 2/16 Lugares
        </p>
        <span class="text-xs font-bold text-primary">Ver Evento</span>
      </div>
    </div>
  </div>
  <button
    class="w-full mt-6 py-2 border border-white/10 rounded-lg text-xs font-black uppercase tracking-widest hover:bg-white/10 transition-all"
  >
    Ver calendario completo
  </button>
</div>
