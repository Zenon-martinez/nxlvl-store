<div
  class="group relative bg-surface-container rounded-xl border border-white/10 overflow-hidden hover:border-primary/50 transition-all duration-500 hover:scale-[1.02] shadow-2xl"
>
  <div class="aspect-[4/5] relative overflow-hidden">
    <img
      class="w-full h-full object-contain grayscale-[0.2] group-hover:grayscale-0 transition-all duration-700"
      [alt]="setData.name"
      [src]="setData.media.coverImage"
    />
    <div
      class="absolute inset-0 bg-gradient-to-t from-surface via-surface/40 to-transparent opacity-90"
    ></div>

    @if (setData.ui.badges.length > 0) {
      <div class="absolute top-4 left-4 flex flex-col gap-2">
        @for (badge of setData.ui.badges; track badge.label) {
          <span
            [class]="
              badgeClass(badge.variant) +
              ' text-[9px] font-black px-2 py-1 uppercase tracking-tighter rounded '
            "
            >{{ badge.label }}</span
          >
        }
      </div>
    }

    <div class="absolute bottom-6 left-6 right-6">
      <div class="h-12 mb-4 flex items-end justify-center">
        <span
          class="text-white text-2xl font-black tracking-tighter uppercase leading-none"
        >
          {{ setData.name }}
        </span>
      </div>
      <div class="flex justify-between items-center gap-4">
        <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">
          Lanzamiento: {{ setData.release.formatted }}
        </span>
        <div class="flex items-center gap-1">
          <div class="w-2 h-2 rounded-full" [class]="availabilityDotClass"></div>
          <span class="text-[8px] font-black uppercase" [class]="availabilityTextClass">
            {{ availabilityLabel }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <div
    class="p-4 bg-surface-container-high border-t border-white/5 flex justify-between items-center"
  >
    <div>
      <p class="text-[8px] font-extrabold text-slate-500 uppercase tracking-widest mb-1">
        Símbolos
      </p>
      <div class="flex gap-2">
        <div
          class="py-1 px-3 rounded-md bg-black border-2 border-white font-black text-sm"
        >
          {{ setData.tcg.setCode }}
        </div>
      </div>
    </div>

    <button
      class="bg-primary/10 text-primary hover:bg-primary hover:text-white p-2 rounded transition-colors duration-300"
      [attr.aria-label]="setData.ui.cta.label"
      type="button"
      (click)="goToExpansion()"
    >
      <mat-icon [svgIcon]="ctaIcon" class="text-sm"></mat-icon>
    </button>
  </div>
</div>
