<!-- Avatar Modal Overlay -->
<div
  class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md transition-all duration-300"
  id="avatar-modal"
>
  <div
    class="relative max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden transform transition-transform duration-300 scale-95"
    id="modal-container"
  >
    <!-- Close Button -->
    <button
      class="absolute top-4 right-4 z-10 size-10 flex items-center justify-center rounded-full bg-slate-800/50 text-white hover:bg-slate-700 transition-colors border border-white/10"
      id="close-modal"
      (click)="close()"
    >
      <mat-icon svgIcon="close"></mat-icon>
    </button>
    <!-- Image Content -->
    <div class="p-2">
      <img
        alt="Large Player Avatar"
        class="w-full h-auto aspect-square object-cover rounded-xl shadow-inner"
        id="modal-image"
        [src]="data.avatarUrl"
      />
    </div>
    <!-- Modal Footer Decor -->
    <div
      class="px-6 py-4 bg-slate-800/50 border-t border-slate-700/50 flex items-center justify-between"
    >
      <div class="flex items-center gap-2">
        <mat-icon svgIcon="verified" class="text-primary"></mat-icon>
        <span class="text-xs font-bold uppercase tracking-widest text-slate-400">{{
          data.name
        }}</span>
      </div>
      <div class="size-2 rounded-full bg-primary animate-pulse"></div>
    </div>
  </div>
</div>
