<!-- Event Detail Preview Floating or Inline (Simulated as detail section) -->
<div class="mt-12 p-6 bg-slate-800/50 rounded-2xl border border-slate-700">
  <div class="flex flex-col lg:flex-row gap-8 items-center">
    <div
      role="button"
      (click)="showPoster()"
      (keydown.enter)="showPoster()"
      (keydown.space)="showPoster()"
      tabindex="0"
      class="w-full lg:w-48 aspect-square rounded-xl overflow-hidden shadow-2xl"
    >
      <img
        class="w-full h-full object-cover"
        alt="Poster oficial"
        [src]="event.coverImageUrl"
        (error)="onPosterError($event)"
      />
    </div>
    <div class="flex-1 space-y-4">
      <div class="flex flex-wrap items-center gap-3">
        <span
          class="px-3 py-1 text-xs font-bold bg-blue-500 rounded-full text-white uppercase tracking-wider"
          >{{ event.game }}</span
        >
        <span
          class="px-3 py-1 text-xs font-bold bg-primary/20 text-primary border border-primary/30 rounded-full"
          >{{ event.description }}</span
        >
      </div>
      <h2 class="text-3xl font-black">{{ event.title }}</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 py-2">
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold mb-1">Hora</p>
          <p class="text-sm font-medium">
            {{ event.startTime }}
          </p>
        </div>
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold mb-1">Costo</p>
          <p class="text-sm font-medium">${{ event.price }} {{ event.currency }}</p>
        </div>
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold mb-1">Formato</p>
          <p class="text-sm font-medium">{{ event.format }}</p>
        </div>
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold mb-1">Lugares</p>
          <p class="text-sm font-medium text-red-400">
            {{ event.registeredPlayers }} de {{ event.capacity }} disponibles
          </p>
        </div>
      </div>
    </div>
    <div class="w-full lg:w-auto">
      <button
        class="w-full lg:w-auto px-10 py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-3"
      >
        <mat-icon
          svgIcon="confirmation_number"
          class="material-symbols-outlined"
        ></mat-icon>
        Apartar lugar
      </button>
    </div>
  </div>
</div>
<app-event-poster
  [hidden]="hidden"
  (hiddenChange)="hidden = $event"
  [event]="event"
></app-event-poster>
