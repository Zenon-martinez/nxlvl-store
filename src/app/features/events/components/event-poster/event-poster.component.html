<div
  [ngClass]="{ hidden: hidden }"
  class="fixed inset-0 z-[100] flex items-center justify-center p-4"
>
  <!-- Backdrop -->
  <button
    class="absolute inset-0 bg-slate-950/80 backdrop-blur-md"
    (click)="hidePoster()"
    (keydown.escape)="hidePoster()"
    type="button"
    aria-label="Close modal"
  ></button>
  <!-- Modal Content -->
  <div
    class="relative bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden max-w-4xl w-full shadow-2xl flex flex-col md:flex-row"
  >
    <!-- Close Button -->
    <button
      class="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/50 hover:bg-slate-700 text-white transition-colors"
      (click)="hidePoster()"
    >
      <mat-icon svgIcon="close" class="material-symbols-outlined"></mat-icon>
    </button>
    <!-- Image Side -->
    <div class="w-full aspect-square md:aspect-auto">
      <img
        [alt]="event.title"
        class="w-full h-full object-cover"
        [src]="event.coverImageUrl"
        (error)="onPosterError($event)"
      />
    </div>
  </div>
</div>
