<!-- Main Content Layout -->
<main class="flex min-h-screen">
  <app-board-games-filters></app-board-games-filters>
  <!-- Product Grid Area -->
  <section class="flex-1 p-8 lg:p-12">
    <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
      <div>
        <div class="text-[10px] font-black text-primary uppercase tracking-[0.4em] mb-2">
          Next Level / Juegos de Mesa
        </div>
        <h1
          class="text-4xl lg:text-6xl font-black uppercase tracking-tight leading-none text-white"
        >
          Juegos de mesa
        </h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest"
          >Mostrando 10 de 100 resultados</span
        >
        <select
          class="bg-surface-container border border-white/10 text-[10px] font-black uppercase tracking-widest py-2 pl-4 pr-10 focus:ring-0 focus:border-primary rounded-none"
        >
          <option>ORDENAR: DESTACADOS</option>
          <option>ORDENAR: PRECIO BAJO-ALTO</option>
          <option>ORDENAR: MÁS NUEVOS</option>
        </select>
      </div>
    </header>
    <app-product-grid [products]="products"></app-product-grid>
    <!-- Pagination -->
    <div class="mt-20 flex justify-center items-center gap-4">
      <button
        class="w-10 h-10 flex items-center justify-center border border-white/10 text-slate-500 hover:text-white hover:border-primary transition-all"
      >
        <mat-icon svgIcon="chevron_left"></mat-icon>
      </button>
      <div class="flex gap-2">
        <button
          class="w-10 h-10 flex items-center justify-center bg-primary text-on-primary font-black text-xs"
        >
          1
        </button>
        <button
          class="w-10 h-10 flex items-center justify-center border border-white/10 text-slate-400 hover:text-white hover:border-white/20 font-black text-xs"
        >
          2
        </button>
        <button
          class="w-10 h-10 flex items-center justify-center border border-white/10 text-slate-400 hover:text-white hover:border-white/20 font-black text-xs"
        >
          3
        </button>
        <span class="text-slate-600 px-2 flex items-center">...</span>
        <button
          class="w-10 h-10 flex items-center justify-center border border-white/10 text-slate-400 hover:text-white hover:border-white/20 font-black text-xs"
        >
          40
        </button>
      </div>
      <button
        class="w-10 h-10 flex items-center justify-center border border-white/10 text-slate-500 hover:text-white hover:border-primary transition-all"
      >
        <mat-icon svgIcon="chevron_right"></mat-icon>
      </button>
    </div>
  </section>
</main>
