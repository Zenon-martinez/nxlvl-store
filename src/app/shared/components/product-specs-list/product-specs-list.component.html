<div class="bg-surface-container p-6 border border-white/5">
  <h3
    class="text-xs font-black uppercase tracking-[0.2em] text-white mb-6 border-b border-white/10 pb-4"
  >
    {{ title }}
  </h3>
  @if (items.length > 0) {
    <div class="space-y-4">
      @for (item of items; track item.label) {
        <div class="flex justify-between gap-4">
          <span class="text-[10px] font-extrabold uppercase text-slate-500">{{
            item.label
          }}</span>
          <span class="text-[10px] font-black uppercase text-white text-right">{{
            item.value
          }}</span>
        </div>
      }
    </div>
  } @else {
    <p class="text-[11px] text-slate-400">Sin especificaciones disponibles.</p>
  }
</div>
