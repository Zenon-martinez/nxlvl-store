<div class="mt-3 p-6 bg-white/5 border border-white/10 space-y-4">
  <p class="text-slate-400 text-sm leading-relaxed mb-8 max-w-lg">
    Team up with Bulbasaur, Charmander, and Squirtle, and witness a brand-new dawn in
    Kanto! With this new day comes a new chance to track down old friends, make new
    partners, and capture every last one of the original 151.
  </p>
  <div class="space-y-6">
    <div class="flex flex-col gap-2">
      <label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500"
        >Select Quantity</label
      >
      <div
        class="flex items-center bg-surface-container border border-white/10 w-fit rounded overflow-hidden"
      >
        <button class="px-4 py-2 hover:bg-white/5 transition-colors">
          <mat-icon svgIcon="remove" class="text-xs"></mat-icon>
        </button>
        <input
          class="w-12 bg-transparent text-center font-bold text-white border-none focus:ring-0"
          type="number"
          value="1"
        />
        <button class="px-4 py-2 hover:bg-white/5 transition-colors">
          <mat-icon svgIcon="add" class="text-xs"></mat-icon>
        </button>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">
      <button
        class="bg-[#137fec] text-white font-black uppercase tracking-widest py-4 text-xs shadow-[0_0_20px_rgba(19,127,236,0.3)] hover:shadow-[0_0_30px_rgba(19,127,236,0.5)] transition-all transform active:scale-95"
      >
        Add to Cart
      </button>
      <button
        class="bg-white/5 border border-white/10 text-white font-black uppercase tracking-widest py-4 text-xs hover:bg-white/10 transition-all transform active:scale-95"
      >
        Buy It Now
      </button>
    </div>
  </div>
</div>
