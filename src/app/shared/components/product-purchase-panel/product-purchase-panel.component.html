@if (data) {
  <div class="mt-3 p-6 bg-white/5 border border-white/10 space-y-6">
    <!-- Short description -->
    <p class="text-slate-400 text-sm leading-relaxed max-w-lg">
      {{ data.description }}
    </p>

    <!-- Quantity selector -->
    <div class="flex flex-col gap-2">
      <label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">
        Cantidad
        <span class="normal-case font-normal ml-1 text-slate-600">({{ data.stock }} disponibles)</span>
      </label>
      <div class="flex items-center bg-surface-container border border-white/10 w-fit overflow-hidden">
        <button
          type="button"
          (click)="decrement()"
          [disabled]="!canDecrement"
          class="px-4 py-2 hover:bg-white/5 transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
          aria-label="Reducir cantidad"
        >
          <mat-icon svgIcon="remove" class="!text-base"></mat-icon>
        </button>
        <input
          type="number"
          class="w-12 bg-transparent text-center font-bold text-white border-none focus:ring-0 focus:outline-none"
          [value]="quantity"
          [min]="1"
          [max]="data.stock"
          [disabled]="!data.available"
          (change)="onQuantityChange($event)"
          aria-label="Cantidad"
        />
        <button
          type="button"
          (click)="increment()"
          [disabled]="!canIncrement"
          class="px-4 py-2 hover:bg-white/5 transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
          aria-label="Aumentar cantidad"
        >
          <mat-icon svgIcon="add" class="!text-base"></mat-icon>
        </button>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <button
        type="button"
        [disabled]="!data.available"
        class="bg-primary text-on-primary font-black uppercase tracking-widest py-4 text-xs shadow-[0_0_20px_rgba(19,127,236,0.3)] hover:shadow-[0_0_30px_rgba(19,127,236,0.5)] transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none"
      >
        Añadir al carrito
      </button>
      <button
        type="button"
        [disabled]="!data.available"
        class="bg-white/5 border border-white/10 text-white font-black uppercase tracking-widest py-4 text-xs hover:bg-white/10 transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed"
      >
        Comprar ahora
      </button>
    </div>
  </div>
}
