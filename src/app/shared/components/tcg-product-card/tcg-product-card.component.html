<!-- Booster Box Card -->
<div
  class="group bg-white/5 border border-white/10 p-6 flex flex-col items-center text-center transition-all duration-500 hover:border-primary/50 hover:bg-white/10 hover:scale-[1.02]"
  *ngIf="product"
>
  <div
    class="relative w-full aspect-square mb-6 overflow-hidden"
    role="none"
    (click)="viewDetails()"
  >
    <img
      [alt]="product.name"
      class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500 cursor-pointer"
      [src]="product.media.images[0].url || 'https://via.placeholder.com/300'"
    />
  </div>
  <span
    class="bg-green-500/20 text-green-500 text-[10px] px-2 py-0.5 font-extrabold uppercase tracking-widest mb-2 border border-green-500/30"
    *ngIf="product.inventory.status === 'in_stock'"
  >
    Disponible
  </span>
  <span
    class="bg-orange-500/20 text-orange-500 text-[10px] px-2 py-0.5 font-extrabold uppercase tracking-widest mb-2 border border-orange-500/30"
    *ngIf="product.inventory.status === 'pre_order'"
  >
    Preventa
  </span>
  <span
    class="bg-red-500/20 text-red-500 text-[10px] px-2 py-0.5 font-extrabold uppercase tracking-widest mb-2 border border-red-500/30"
    *ngIf="product.inventory.status === 'out_of_stock'"
  >
    Agotado
  </span>
  <span
    class="bg-white/5 text-slate-400 text-[10px] px-2 py-0.5 font-extrabold uppercase tracking-widest mb-2 border border-white/10 ml-2"
    >{{ language[product.language] }}</span
  >

  <h3 class="text-sm font-bold text-white mb-2">{{ product.name }}</h3>
  <!-- <p class="text-xs text-white/60 mb-4">{{ product.nameLocalized?.es }}</p> -->
  <p class="text-2xl font-black text-primary mb-6">
    {{ product.pricing.currency === 'MXN' ? '$' : 'USD ' }}{{ product.pricing.price }}
  </p>

  <div class="w-full grid grid-cols-1 gap-2">
    <!-- <button
      class="bg-primary text-white py-3 font-bold text-xs uppercase tracking-widest rounded-sm active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="product.inventory.status === 'out_of_stock'"
    >
      Agregar al carrito
    </button> -->
    <button
      class="bg-white/5 border border-white/10 text-white py-3 font-bold text-xs uppercase tracking-widest rounded-sm hover:bg-white/10 transition-colors"
      (click)="viewDetails()"
    >
      Ver detalles
    </button>
  </div>
</div>

<!-- Empty state if no product -->
<div
  class="group bg-white/5 border border-dashed border-white/10 p-6 flex flex-col items-center justify-center text-center h-full"
  *ngIf="!product"
>
  <span class="material-symbols-outlined text-4xl text-slate-700 mb-2">package</span>
  <p class="text-xs text-slate-600 font-semibold">Producto no disponible</p>
</div>
